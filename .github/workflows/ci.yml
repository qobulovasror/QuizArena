name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  server:
    name: Server (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: server/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  client:
    name: Client (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
