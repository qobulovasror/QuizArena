# QuizArena — Bosqich 0 dev muhiti.
# Redis YO'Q (ataylab kechiktirilgan — qarang PLAN.md §1.1, §2).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quizarena
      POSTGRES_PASSWORD: quizarena
      POSTGRES_DB: quizarena
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quizarena"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: ./server
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://quizarena:quizarena@postgres:5432/quizarena?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
