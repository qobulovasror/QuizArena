version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"       # .sql so'rovlar (keyin)
    schema: "migrations"     # goose migratsiya fayllari sxema manbai
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
